<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extrator de Notas — Arcal</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #111827;
            --panel-2: #1f2937;
            --border: #334155;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --accent: #10b981;
            --accent-2: #059669;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, #1e293b 0%, var(--bg) 55%);
            color: var(--text);
            min-height: 100vh;
        }
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        header h1 {
            margin: 0 0 8px 0;
            font-size: 28px;
            letter-spacing: -0.02em;
        }
        header p {
            margin: 0 0 32px 0;
            color: var(--muted);
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        }
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 36px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .dropzone:hover, .dropzone.drag {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.06);
        }
        .dropzone strong { color: var(--accent); }
        .dropzone p { margin: 8px 0 0 0; color: var(--muted); font-size: 14px; }
        input[type="file"] { display: none; }
        .file-list {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 240px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }
        .file-item .meta { color: var(--muted); font-size: 12px; }
        .file-item button {
            background: transparent;
            color: var(--danger);
            border: none;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
        }
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: flex-end;
        }
        button.primary {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-2) 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.05s, opacity 0.2s;
        }
        button.primary:hover:not(:disabled) { transform: translateY(-1px); }
        button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.info { display: block; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); }
        .status.success { display: block; background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.4); }
        .status.error { display: block; background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.4); color: #fecaca; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { margin-top: 32px; color: var(--muted); font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Extrator de Notas</h1>
            <p>Envie várias fotos de cupom fiscal/nota de pedido e receba uma planilha XLSX com tudo estruturado.</p>
        </header>

        <form id="upload-form" class="card">
            <label class="dropzone" id="dropzone" for="files">
                <div>📄 Arraste as imagens aqui ou <strong>clique para selecionar</strong></div>
                <p>JPG, JPEG ou PNG — até 25MB por arquivo</p>
            </label>
            <input type="file" id="files" name="files" accept="image/jpeg,image/png,image/jpg" multiple>

            <div id="file-list" class="file-list"></div>

            <div class="actions">
                <button type="submit" id="submit-btn" class="primary" disabled>
                    Extrair e baixar planilha
                </button>
            </div>

            <div id="status" class="status"></div>
        </form>

        <footer>Feito para Arcal Argamassa · extração via IA</footer>
    </div>

    <script>
        const form = document.getElementById('upload-form');
        const input = document.getElementById('files');
        const dropzone = document.getElementById('dropzone');
        const fileList = document.getElementById('file-list');
        const submitBtn = document.getElementById('submit-btn');
        const status = document.getElementById('status');

        let selected = [];

        function renderList() {
            fileList.innerHTML = '';
            selected.forEach((file, idx) => {
                const row = document.createElement('div');
                row.className = 'file-item';
                const sizeKb = (file.size / 1024).toFixed(0);
                row.innerHTML = `
                    <div>
                        <div>${file.name}</div>
                        <div class="meta">${sizeKb} KB</div>
                    </div>
                `;
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = '×';
                btn.onclick = () => { selected.splice(idx, 1); renderList(); };
                row.appendChild(btn);
                fileList.appendChild(row);
            });
            submitBtn.disabled = selected.length === 0;
        }

        function addFiles(list) {
            for (const f of list) {
                if (!/image\/(png|jpe?g)/i.test(f.type)) continue;
                selected.push(f);
            }
            renderList();
        }

        input.addEventListener('change', (e) => addFiles(e.target.files));

        ['dragenter', 'dragover'].forEach(evt => {
            dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
        });
        ['dragleave', 'drop'].forEach(evt => {
            dropzone.addEventListener(evt, (e) => { e.preventDefault(); dropzone.classList.remove('drag'); });
        });
        dropzone.addEventListener('drop', (e) => addFiles(e.dataTransfer.files));

        function setStatus(type, html) {
            status.className = `status ${type}`;
            status.innerHTML = html;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selected.length === 0) return;

            const fd = new FormData();
            selected.forEach(f => fd.append('files', f));

            submitBtn.disabled = true;
            setStatus('info', `<span class="spinner"></span> Processando ${selected.length} nota(s)... isso pode levar alguns segundos.`);

            try {
                const res = await fetch('/upload/multiple', { method: 'POST', body: fd });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text || `HTTP ${res.status}`);
                }

                const processed = res.headers.get('X-Processed-Files') || selected.length;
                const skipped = res.headers.get('X-Skipped-Files') || 0;

                const blob = await res.blob();
                const disposition = res.headers.get('Content-Disposition') || '';
                const match = disposition.match(/filename="?([^";]+)"?/i);
                const filename = match ? match[1] : 'notas.xlsx';

                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click();
                a.remove(); URL.revokeObjectURL(url);

                setStatus('success', `✔ Planilha gerada. Processadas: ${processed} · Ignoradas: ${skipped}.`);
                selected = []; renderList();
            } catch (err) {
                setStatus('error', `Erro: ${err.message}`);
            } finally {
                submitBtn.disabled = selected.length === 0;
            }
        });
    </script>
</body>
</html>
